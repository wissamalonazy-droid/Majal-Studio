<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAJAL SOVEREIGN | مَجال السيادية</title>
    <style>
        :root { --black: #050505; --navy: #0A1F44; --gold: #C5A059; --terminal: #101010; }
        body { background: var(--black); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* تصميم الواجهة العسكرية الفخمة */
        .header { background: var(--navy); padding: 15px 25px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .core-status { font-size: 11px; color: #4AF626; text-transform: uppercase; }

        .editor-container { flex: 1; display: grid; grid-template-columns: 1fr 350px; gap: 5px; padding: 10px; background: #000; }
        #editor { background: var(--terminal); color: #fff; border: 1px solid #222; border-radius: 5px; padding: 20px; font-size: 18px; line-height: 1.5; outline: none; resize: none; }
        
        #monitor { background: #000; border: 1px solid var(--gold); border-radius: 5px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .log { border-left: 2px solid var(--gold); padding-right: 10px; font-size: 13px; }
        
        .btn-boot { background: var(--gold); color: #000; border: none; padding: 12px 35px; border-radius: 4px; font-weight: 900; cursor: pointer; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0; color:var(--gold);">MAJAL <span style="color:white; font-size:12px;">CORE V5.0</span></h2>
        <div class="core-status">● HEAVY_DUTY_KERNEL_ACTIVE</div>
    </div>
    <button class="btn-boot" onclick="SovereignCore.init()">إقلاع النواة ▶</button>
</div>

<div class="editor-container">
    <textarea id="editor" spellcheck="false">
# بناء الأساس القوي لـ مَجال
عرف الطاقة = 100
عرف التهديد = 50

لو الطاقة > التهديد:
   اطبع "النظام في حالة أمان قصوى"

احسب الطاقة * 2
اطبع "مستوى الطاقة الجديد هو الحسبة"
    </textarea>

    <div id="monitor">
        <div style="color:var(--gold); font-weight:bold; border-bottom:1px solid #333; padding-bottom:5px;">MONITOR_LOG:</div>
    </div>
</div>

<script>
    // --- النواة السيادية (Majal Sovereign Engine) ---
    const SovereignCore = {
        registry: new Map(), // استخدام Map لسرعة الوصول وحماية الذاكرة
        accumulator: 0,

        init: function() {
            const code = document.getElementById('editor').value;
            const monitor = document.getElementById('monitor');
            monitor.innerHTML = "<div style='color:cyan'>[INITIALIZING KERNEL...]</div>";
            this.registry.clear(); // تصفير الذاكرة الفولاذي
            
            const stream = code.split('\n').map(s => s.trim()).filter(s => s && !s.startsWith("#"));
            stream.forEach(instruction => this.parse(instruction, monitor));
        },

        parse: function(ins, monitor) {
            try {
                // 1. معالج التعريف (Registration)
                if (ins.startsWith("عرف")) {
                    let [rawKey, rawVal] = ins.replace("عرف", "").split("=");
                    let key = rawKey.trim();
                    let val = eval(rawVal.trim().replace(/"/g, "'"));
                    this.registry.set(key, val);
                    this.log(monitor, `MEM_WRITE: ${key} -> ${val}`, "white");
                }

                // 2. معالج المنطق (Logic Processor)
                else if (ins.startsWith("لو")) {
                    let condition = ins.replace("لو", "").replace(":", "").trim();
                    // استبدال المتغيرات في الشرط
                    this.registry.forEach((v, k) => {
                        condition = condition.replace(new RegExp(`\\b${k}\\b`, 'g'), v);
                    });
                    if (eval(condition)) {
                        this.log(monitor, "LOGIC_CHECK: PASSED", "#4AF626");
                    } else {
                        this.log(monitor, "LOGIC_CHECK: FAILED", "#ff4444");
                    }
                }

                // 3. معالج الحساب (Math Engine)
                else if (ins.startsWith("احسب")) {
                    let exp = ins.replace("احسب", "").trim();
                    this.registry.forEach((v, k) => {
                        exp = exp.replace(new RegExp(`\\b${k}\\b`, 'g'), v);
                    });
                    this.accumulator = eval(exp);
                    this.log(monitor, `MATH_EXEC: ${exp} = ${this.accumulator}`, "cyan");
                }

                // 4. معالج الإخراج (Output Unit)
                else if (ins.startsWith("اطبع")) {
                    let msg = ins.replace("اطبع", "").trim();
                    msg = msg.replace("الحسبة", this.accumulator);
                    this.registry.forEach((v, k) => {
                        let val = typeof v === 'string' ? `'${v}'` : v;
                        msg = msg.replace(new RegExp(`\\b${k}\\b`, 'g'), val);
                    });
                    this.log(monitor, `> ${eval(msg)}`, "#C5A059");
                }
            } catch (err) {
                this.log(monitor, `CORE_CRITICAL_ERR: ${ins}`, "#ff4444");
            }
        },

        log: function(target, text, color) {
            target.innerHTML += `<div class="log" style="color:${color}">${text}</div>`;
            target.scrollTop = target.scrollHeight;
        }
    };
</script>

</body>
</html>
