<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJAL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Tajawal', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 32px; 
        }
        #codeEditor { 
            background: transparent; border: none; outline: none; resize: none;
            color: #94a3b8; font-family: 'Consolas', monospace; font-size: 18px;
            padding: 30px; line-height: 1.7; width: 100%; height: 100%;
        }
        .main-btn {
            background: #2563eb;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.2);
            border-radius: 28px;
        }
    </style>
</head>
<body class="p-6 flex flex-col gap-6">

    <header class="flex justify-between items-center px-2">
        <div class="flex bg-slate-900/90 p-1.5 rounded-2xl border border-white/5">
            <button class="px-6 py-2 bg-blue-600 rounded-xl text-[11px] font-bold">Desktop 💻</button>
            <button class="px-6 py-2 text-slate-500 text-[11px]">Tablet 📟</button>
            <button class="px-6 py-2 text-slate-500 text-[11px]">Mobile 📱</button>
        </div>
        <h1 class="text-xl font-black text-blue-500 italic">MAJAL <span class="text-white font-light text-sm">PRO</span></h1>
    </header>

    <div class="glass-panel flex-1 flex flex-col overflow-hidden">
        <div class="p-5 border-b border-white/5 flex justify-between items-center">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">NUCLEUS v15 | محرك البناء السيادي</span>
        </div>

        <textarea id="codeEditor" spellcheck="false">عرف اسم_الموقع = "موقع مَجال الجديد"

<div style="padding:100px; text-align:center;">
  <h1 style="color:#2563eb; font-size:48px;">{اسم_الموقع}</h1>
</div></textarea>
        
        <div class="p-4 bg-black/20 text-[11px] text-blue-400 font-mono flex justify-end items-center gap-2">
            <span>النظام جاهز</span>
            <span>📟</span>
        </div>
    </div>

    <button onclick="run()" class="main-btn w-full py-7 text-white font-black text-2xl transition-transform active:scale-95">
        تشغيل النظام ⚡
    </button>

    <script>
        function run() {
            // النواة المحلية (بدون ربط)
            const code = document.getElementById('codeEditor').value;
            alert("تم إقلاع المحرك بنجاح 🚀");
        }
    </script>
</body>
</html>
