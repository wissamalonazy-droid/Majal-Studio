<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAJAL | مَجال</title>
    <style>
        body {
            background-color: #0B0B0B;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #0A1F44;
            padding: 30px;
            border-bottom: 2px solid #C5A059;
            text-align: center;
        }

        .logo {
            color: #C5A059;
            font-size: 35px;
            font-weight: 900;
            letter-spacing: 8px;
            margin: 0;
        }

        #editor {
            flex: 1;
            background-color: #0B0B0B;
            color: #efefef;
            padding: 40px;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            border: none;
            outline: none;
            resize: none;
            text-align: right;
            line-height: 1.8;
        }

        #console {
            height: 200px;
            background-color: #000;
            border-top: 1px solid #C5A059;
            padding: 25px;
            color: #C5A059;
            overflow-y: auto;
            font-size: 18px;
        }

        .btn-run {
            position: fixed;
            bottom: 240px;
            left: 50px;
            background-color: #C5A059;
            color: black;
            border: none;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
            font-size: 18px;
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">MAJAL</h1>
</header>

<textarea id="editor" spellcheck="false">
# مَجال: النسخة الأصلية
عرف القوة = 100000
اطبع "مرحباً بك في مَجال"
</textarea>

<button class="btn-run" onclick="run()">إقلاع</button>

<div id="console">> جاهز...</div>

<script>
    const memory = new Map();
    function run() {
        const code = document.getElementById('editor').value;
        const con = document.getElementById('console');
        con.innerHTML = "";
        memory.clear();

        code.split('\n').forEach(line => {
            line = line.trim();
            if(!line || line.startsWith("#")) return;
            try {
                if(line.startsWith("عرف")) {
                    let [n, v] = line.replace("عرف","").split("=");
                    memory.set(n.trim(), eval(v.trim().replace(/"/g,"'")));
                } else if(line.startsWith("اطبع")) {
                    let exp = line.replace("اطبع","").trim();
                    memory.forEach((v, k) => {
                        exp = exp.replace(new RegExp(`\\b${k}\\b`, 'g'), typeof v === 'string' ? `'${v}'` : v);
                    });
                    con.innerHTML += `<div>📄 > ${eval(exp)}</div>`;
                }
            } catch(e) { con.innerHTML += `<div>خطأ: ${line}</div>`; }
        });
    }
</script>

</body>
</html>
