<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Majal 2.0 | محرك اللغة الأم</title>
    <style>
        :root { --bg: #020C1B; --navy: #0A192F; --gold: #64FFDA; --white: #E6F1FF; }
        body { background: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--navy); padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .container { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        textarea { flex: 1; background: #112240; color: var(--gold); border: 1px solid var(--navy); border-radius: 10px; padding: 20px; font-size: 18px; font-family: 'Courier New', monospace; outline: none; resize: none; }
        #output { flex: 1; background: #fff; border-radius: 10px; overflow-y: auto; border: 3px solid var(--gold); position: relative; }
        .controls { padding: 15px; text-align: center; }
        button { background: var(--gold); color: var(--bg); border: none; padding: 12px 40px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>MAJAL 2.0 <small>محرك اللغة الأم</small></h1></header>
    <div class="container">
        <textarea id="code" placeholder="# اكتب كود مَجال أو اللغة الأم هنا...">
# تعريف متغير بمَجال
عرف عنوان = "موقعي الاحترافي"

# استخدام اللغة الأم (HTML) مباشرة داخل مَجال
هيكل:
<div style="padding: 40px; text-align: center; font-family: Arial;">
    <h1 style="color: #0A192F;"> {عنوان} </h1>
    <p> المبرمج هنا له الحرية المطلقة في كتابة أي كود </p>
    <button onclick="alert('تم التشغيل')">زر تفاعلي</button>
</div>
</textarea>
        <div id="output">
            <div id="canvas"></div>
        </div>
    </div>
    <div class="controls">
        <button onclick="runMajal()">تشغيل النظام 🚀</button>
    </div>

    <script>
        const memory = new Map();

        function runMajal() {
            const code = document.getElementById('code').value;
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = ""; 
            memory.clear();

            // فصل الأكواد (منطق مَجال vs اللغة الأم)
            const parts = code.split('هيكل:');
            
            // 1. معالجة منطق مَجال (قبل الهيكل)
            const logic = parts[0].split('\n');
            logic.forEach(line => {
                line = line.trim();
                if (line.startsWith("عرف")) {
                    let [n, v] = line.replace("عرف","").split("=");
                    memory.set(n.trim(), eval(v.trim().replace(/"/g,"'")));
                }
            });

            // 2. معالجة اللغة الأم (بعد كلمة هيكل:)
            if (parts[1]) {
                let rawHTML = parts[1].trim();
                // استبدال المتغيرات الذكي داخل الكود الخام
                memory.forEach((v, k) => {
                    rawHTML = rawHTML.replace(new RegExp(`{${k}}`, 'g'), v);
                });
                canvas.innerHTML = rawHTML;
            }
        }
    </script>
</body>
</html>
