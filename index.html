<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJAL ENGINE | محرك مَجال العام</title>
    <style>
        :root { --royal-black: #0B0B0B; --navy-blue: #0A1F44; --gold: #C5A059; }
        body { background: var(--royal-black); color: white; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .toolbar { background: var(--navy-blue); padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; }
        .quick-bar { background: #1a1a1a; padding: 10px; display: flex; gap: 5px; overflow-x: auto; }
        .q-btn { background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        #editor { flex: 1; background: var(--royal-black); color: #fff; padding: 20px; font-family: monospace; font-size: 18px; border: none; outline: none; resize: none; text-align: right; }
        #console { height: 35%; background: #000; color: #4AF626; padding: 15px; font-family: monospace; overflow-y: auto; border-top: 2px solid var(--gold); }
        .run-btn { background: var(--gold); color: black; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="toolbar">
    <div style="color:var(--gold); font-weight:bold;">MAJAL STUDIO V3</div>
    <button class="run-btn" onclick="runMajal()">تشغيل ▶</button>
</div>

<div class="quick-bar" id="bar"></div>

<textarea id="editor" spellcheck="false">
عرف الاسم = "وسام"
عرف العمر = 25
لو العمر > 18:
   اطبع "مرحباً بك يا " + الاسم
اطبع "النظام جاهز"
</textarea>

<div id="console">> محرك مَجال العام جاهز...</div>

<script>
    // إنشاء الأزرار تلقائياً
    const keywords = ['عرف', '=', 'لو', ':', 'اطبع', '"', '+', '>', '<'];
    keywords.forEach(key => {
        document.getElementById('bar').innerHTML += `<button class="q-btn" onclick="addText('${key} ')">${key}</button>`;
    });

    function addText(t) { document.getElementById('editor').value += t; }

    let memory = {};

    function runMajal() {
        const code = document.getElementById('editor').value;
        const consoleDiv = document.getElementById('console');
        const lines = code.split('\n');
        consoleDiv.innerHTML = "";
        
        lines.forEach(line => {
            line = line.trim();
            if (!line) return;

            try {
                // 1. منطق التعريف (Variables)
                if (line.startsWith("عرف")) {
                    let parts = line.replace("عرف", "").split("=");
                    let name = parts[0].trim();
                    let val = eval(parts[1].trim().replace(/"/g, "'"));
                    memory[name] = val;
                }
                
                // 2. منطق الطباعة (Output)
                else if (line.startsWith("اطبع")) {
                    let content = line.replace("اطبع", "").trim();
                    // تعويض المتغيرات في الطباعة
                    for (let key in memory) {
                        let regex = new RegExp(key, "g");
                        content = content.replace(regex, typeof memory[key] === 'string' ? `'${memory[key]}'` : memory[key]);
                    }
                    let output = eval(content);
                    consoleDiv.innerHTML += `<div>📄 ناتج: ${output}</div>`;
                }

                // 3. منطق الشرط (Logic)
                else if (line.startsWith("لو")) {
                    consoleDiv.innerHTML += `<div style="color:var(--gold)">⚖️ فحص منطقي: ${line}</div>`;
                }
            } catch (e) {
                consoleDiv.innerHTML += `<div style="color:red">❌ خطأ في السطر: ${line}</div>`;
            }
        });
    }
</script>

</body>
</html>
