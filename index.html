<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJAL PRO | NUCLEUS v15 (Independent)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #0ea5e9; --bg: #020617; }
        body { background: radial-gradient(circle at top right, #0f172a, var(--bg)); color: #f8fafc; font-family: 'Tajawal', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 24px; }
        #codeEditor { font-family: 'Fira Code', monospace; background: transparent; color: #93c5fd; width: 100%; padding: 25px; outline: none; border: none; font-size: 16px; line-height: 1.6; resize: none; flex: 1; }
        .preview-wrapper { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #0f172a; overflow: auto; }
        .iframe-container { background: white; box-shadow: 0 0 100px rgba(0,0,0,0.7); border: none; transition: all 0.4s ease; }
        .mobile-view { width: 375px !important; height: 667px !important; }
        .tablet-view { width: 768px !important; height: 1024px !important; }
        .desktop-view { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body x-data="{ view: 'desktop' }">

    <header class="h-[75px] flex items-center justify-between px-8 bg-black/40 border-b border-white/5 backdrop-blur-md">
        <h1 class="text-xl font-black text-blue-500 italic tracking-tighter">MAJAL <span class="text-white font-light text-sm">PRO</span></h1>
        <div class="flex bg-white/5 p-1.5 rounded-2xl border border-white/10 gap-1">
            <button @click="view = 'mobile'" :class="view === 'mobile' ? 'bg-blue-600 text-white' : 'text-gray-400'" class="px-4 py-1.5 rounded-xl text-[10px] font-bold transition-all">📱 Mobile</button>
            <button @click="view = 'tablet'" :class="view === 'tablet' ? 'bg-blue-600 text-white' : 'text-gray-400'" class="px-4 py-1.5 rounded-xl text-[10px] font-bold transition-all">📟 Tablet</button>
            <button @click="view = 'desktop'" :class="view === 'desktop' ? 'bg-blue-600 text-white' : 'text-gray-400'" class="px-4 py-1.5 rounded-xl text-[10px] font-bold transition-all">💻 Desktop</button>
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col gap-5 overflow-hidden">
        <div class="glass flex-1 flex flex-col overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/5">
                <span class="text-[11px] text-blue-400 font-black uppercase tracking-widest">محرك البناء السيادي</span>
            </div>
            <textarea id="codeEditor" spellcheck="false" placeholder="// اكتب كودك هنا...">
عرف اسم_الموقع = "موقع مَجال الجديد"
<div style="padding:100px; text-align:center; font-family:sans-serif;">
   <h1 style="color:#2563eb; font-size:48px;">{اسم_الموقع}</h1>
   <p>تم التشغيل بنجاح من النواة المدمجة ✅</p>
</div></textarea>
            <div id="statusBar" class="p-4 bg-black/40 text-xs border-t border-white/5 text-blue-300 font-mono">📟 النظام جاهز</div>
        </div>
        <button onclick="runMajalLocal()" class="bg-blue-600 hover:bg-blue-500 p-5 rounded-[2rem] font-black text-xl shadow-2xl shadow-blue-900/40 transition-all">تشغيل النظام ⚡</button>
    </main>

    <div id="previewModal" class="fixed inset-0 z-[100] bg-slate-950 hidden flex flex-col">
        <div class="w-full p-4 bg-black flex justify-between items-center border-b border-white/10">
            <span class="text-blue-500 font-black text-xs uppercase tracking-widest">المعاينة المباشرة</span>
            <button onclick="document.getElementById('previewModal').classList.add('hidden')" class="text-white text-4xl">&times;</button>
        </div>
        <div class="preview-wrapper">
            <iframe id="livePreview" class="iframe-container" :class="view === 'mobile' ? 'mobile-view' : (view === 'tablet' ? 'tablet-view' : 'desktop-view')"></iframe>
        </div>
    </div>

    <script>
        const registry = new Map();
        function runMajalLocal() {
            const code = document.getElementById('codeEditor').value;
            const preview = document.getElementById('livePreview');
            const statusBar = document.getElementById('statusBar');
            registry.clear();

            let finalOutput = "";
            code.split('\n').forEach(line => {
                if (line.trim().startsWith("عرف")) {
                    let [n, v] = line.replace("عرف", "").split("=");
                    registry.set(n.trim(), eval(v.trim().replace(/"/g, "'")));
                } else { finalOutput += line + "\n"; }
            });

            registry.forEach((v, k) => { finalOutput = finalOutput.replace(new RegExp(`{${k}}`, 'g'), v); });

            const doc = preview.contentWindow.document;
            doc.open(); doc.write(finalOutput); doc.close();
            document.getElementById('previewModal').classList.remove('hidden');
            statusBar.innerText = "📟 تم التحديث بنجاح";
        }
    </script>
</body>
</html>
