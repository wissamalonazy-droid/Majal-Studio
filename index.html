<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAJAL SYSTEM | نظام مَجال المتكامل</title>
    <style>
        :root { --royal-black: #0B0B0B; --navy: #0A1F44; --gold: #C5A059; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* تصميم يحاكي أنظمة التشغيل الفخمة */
        header { background: var(--navy); padding: 20px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .system-status { font-size: 12px; color: var(--gold); letter-spacing: 1px; }

        .main-container { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        
        /* منطقة الأكواد المحمية */
        #editor { flex: 2; background: var(--royal-black); border: 1px solid #222; border-radius: 10px; padding: 20px; color: #fff; font-size: 19px; outline: none; resize: none; box-shadow: inset 0 0 20px #000; }

        /* الكونسول (منطقة المعالجة المركزية) */
        #console { flex: 1; background: #000; border: 1px solid var(--gold); border-radius: 10px; padding: 15px; overflow-y: auto; color: #4AF626; font-size: 14px; }

        .btn-run { background: var(--gold); color: black; border: none; padding: 15px 40px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-run:hover { transform: translateY(-3px); box-shadow: 0 5px 20px var(--gold); }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; color:var(--gold); font-size:28px;">MAJAL <span style="font-size:14px; color:white;">SYSTEM V4</span></h1>
        <div class="system-status">STATUS: ONLINE | CORE: ACTIVE</div>
    </div>
    <button class="btn-run" onclick="MajalSystem.boot()">تشغيل النظام ▶</button>
</header>

<div class="main-container">
    <textarea id="editor" spellcheck="false">
# تأسيس نظام مَجال القوي
عرف المستخدم = "سوهيل"
عرف الرصيد = 5000
عرف المشتريات = 1200

احسب الرصيد - المشتريات
اطبع "مرحباً يا " + المستخدم
اطبع "رصيدك المتبقي هو الحسبة"
    </textarea>

    <div id="console">> نظام مَجال بانتظار إشارة البدء...</div>
</div>

<script>
    // --- النواة التأسيسية القوية (The Core System) ---
    const MajalSystem = {
        memory: {},
        lastResult: 0,

        boot: function() {
            const code = document.getElementById('editor').value;
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML = "<div style='color:var(--gold)'>[SYSTEM BOOTING...]</div>";
            this.memory = {}; // تصفير الذاكرة لضمان الصلابة
            
            const lines = code.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith("#"));
            
            lines.forEach(line => this.process(line, consoleDiv));
            consoleDiv.innerHTML += "<div style='color:var(--gold)'>[PROCESS COMPLETED]</div>";
        },

        process: function(line, display) {
            try {
                // معالجة التعريف الصلب
                if (line.startsWith("عرف")) {
                    let parts = line.replace("عرف", "").split("=");
                    let name = parts[0].trim();
                    let value = eval(parts[1].trim().replace(/"/g, "'"));
                    this.memory[name] = value;
                    display.innerHTML += `<div>⚙️ MEM_LOAD: [${name}] SUCCESS</div>`;
                }
                
                // معالجة الحساب وحفظ النتيجة في الذاكرة المؤقتة
                else if (line.startsWith("احسب")) {
                    let exp = line.replace("احسب", "").trim();
                    for (let key in this.memory) {
                        let reg = new RegExp(`\\b${key}\\b`, 'g');
                        exp = exp.replace(reg, this.memory[key]);
                    }
                    this.lastResult = eval(exp);
                    display.innerHTML += `<div>📊 CALC_RES: ${this.lastResult}</div>`;
                }

                // معالجة الطباعة الذكية
                else if (line.startsWith("اطبع")) {
                    let exp = line.replace("اطبع", "").trim();
                    exp = exp.replace("الحسبة", this.lastResult); // ربط الحساب بالطباعة
                    for (let key in this.memory) {
                        let reg = new RegExp(`\\b${key}\\b`, 'g');
                        let val = typeof this.memory[key] === 'string' ? `'${this.memory[key]}'` : this.memory[key];
                        exp = exp.replace(reg, val);
                    }
                    display.innerHTML += `<div style="color:#C5A059">> ${eval(exp)}</div>`;
                }
            } catch (e) {
                display.innerHTML += `<div style="color:red">⚠️ SYS_ERR: ${line}</div>`;
            }
        }
    };
</script>

</body>
</html>
