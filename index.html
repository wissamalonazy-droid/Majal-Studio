<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJAL STUDIO | ستوديو مَجال الملكي</title>
    <style>
        /* الهوية البصرية لبراند سوهيل إلوس */
        :root {
            --royal-black: #0B0B0B;
            --navy-blue: #0A1F44;
            --gold: #C5A059;
            --glass-white: rgba(255, 255, 255, 0.1);
            --code-green: #4AF626;
        }

        body {
            background-color: var(--royal-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط العنوان (Toolbar) */
        header {
            background-color: var(--navy-blue);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .logo {
            color: var(--gold);
            font-weight: bold;
            font-size: 22px;
            letter-spacing: 3px;
            margin: 0;
        }

        /* شريط الأوامر السريعة للجوال */
        .quick-bar {
            background: #151515;
            padding: 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }

        .q-btn {
            background: var(--navy-blue);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 16px;
            border-radius: 8px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .q-btn:active {
            transform: scale(0.9);
            background: var(--gold);
            color: black;
        }

        /* منطقة المحرر */
        #editor {
            flex: 1;
            background-color: var(--royal-black);
            color: #efefef;
            padding: 25px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            line-height: 1.6;
            border: none;
            outline: none;
            resize: none;
            text-align: right;
        }

        /* شاشة النتائج (Console) */
        #console {
            height: 30%;
            background-color: #050505;
            border-top: 2px solid var(--gold);
            padding: 20px;
            overflow-y: auto;
            color: var(--code-green);
            font-family: monospace;
            font-size: 14px;
        }

        /* زر التشغيل العائم */
        .run-btn {
            background-color: var(--gold);
            color: var(--royal-black);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
            transition: 0.3s;
        }

        .run-btn:hover {
            box-shadow: 0 0 30px var(--gold);
        }

        .copy-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">MAJAL | مَجال</h1>
    <button class="run-btn" onclick="runMajal()">تشغيل النظام ▶</button>
</header>

<div class="quick-bar">
    <button class="q-btn" onclick="insert('عرف ')">عرف</button>
    <button class="q-btn" onclick="insert(' = ')">=</button>
    <button class="q-btn" onclick="insert('اطبع ')">اطبع</button>
    <button class="q-btn" onclick="insert('لو ')">لو</button>
    <button class="q-btn" onclick="insert('احسب ')">احسب</button>
    <button class="q-btn" onclick="insert('\"\"')">""</button>
    <button class="copy-btn" onclick="copyCode()">نسخ 📋</button>
</div>

<textarea id="editor" spellcheck="false" placeholder="ابدأ ببرمجة مَجال هنا...">
عرف الاسم = "وسام"
عرف السعر = 1500
عرف الخصم = 200
احسب السعر - الخصم
اطبع "مرحباً يا " + الاسم
</textarea>

<div id="console">> نظام مَجال (النواة المحدثة) جاهز...</div>

<script>
    // ذاكرة اللغة (النواة)
    let memory = {};

    // وظيفة إدخال النص السريع
    function insert(text) {
        const ed = document.getElementById('editor');
        const start = ed.selectionStart;
        const end = ed.selectionEnd;
        ed.value = ed.value.substring(0, start) + text + ed.value.substring(end);
        ed.focus();
        ed.selectionStart = ed.selectionEnd = start + text.length;
    }

    // وظيفة نسخ الكود
    function copyCode() {
        const ed = document.getElementById('editor');
        ed.select();
        document.execCommand('copy');
        alert("تم نسخ الكود بنجاح! ✅");
    }

    // --- محرك مَجال (The Engine) ---
    function runMajal() {
        const code = document.getElementById('editor').value;
        const consoleDiv = document.getElementById('console');
        const lines = code.split('\n');
        
        consoleDiv.innerHTML = "<div style='color:white'>[بدء التنفيذ...]</div>";
        memory = {}; // تصفير الذاكرة عند كل تشغيل جديد

        lines.forEach(line => {
            line = line.trim();
            if (!line || line.startsWith("#")) return;

            try {
                // 1. معالجة التعريف (Variables)
                if (line.startsWith("عرف")) {
                    let clean = line.replace("عرف", "").replace(/\s/g, "");
                    let [name, val] = clean.split("=");
                    // معالجة النصوص والأرقام
                    memory[name] = eval(val.replace(/"/g, "'"));
                    consoleDiv.innerHTML += `<div>✔️ تم تعريف المتغير [${name}]</div>`;
                }

                // 2. معالجة الحساب (Calculate)
                else if (line.startsWith("احسب")) {
                    let exp = line.replace("احسب", "").trim();
                    for (let key in memory) {
                        let reg = new RegExp(`\\b${key}\\b`, 'g');
                        exp = exp.replace(reg, memory[key]);
                    }
                    consoleDiv.innerHTML += `<div style="color:var(--gold)">📊 نتيجة الحساب: ${eval(exp)}</div>`;
                }

                // 3. معالجة الطباعة (Output)
                else if (line.startsWith("اطبع")) {
                    let exp = line.replace("اطبع", "").trim();
                    // تعويض المتغيرات في جملة الطباعة
                    for (let key in memory) {
                        let reg = new RegExp(`\\b${key}\\b`, 'g');
                        let val = typeof memory[key] === 'string' ? `'${memory[key]}'` : memory[key];
                        exp = exp.replace(reg, val);
                    }
                    consoleDiv.innerHTML += `<div style="color:#C5A059; font-weight:bold;">📄 ناتج مَجال: ${eval(exp)}</div>`;
                }
            } catch (e) {
                consoleDiv.innerHTML += `<div style="color:red">❌ خطأ في السطر: ${line}</div>`;
            }
        });
        consoleDiv.innerHTML += "<div style='color:white'>[تم الانتهاء]</div>";
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }
</script>

</body>
</html>
