<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJAL PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* تصميم المحرر المستوحى من الصورة */
        .window-glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
        }

        #editor {
            background: transparent;
            color: #94a3b8;
            font-family: 'Consolas', monospace;
            font-size: 18px;
            padding: 30px;
            width: 100%;
            height: 100%;
            outline: none;
            border: none;
            resize: none;
            text-align: right;
            line-height: 1.8;
        }

        /* زر التشغيل الكبير في الأسفل */
        .run-btn {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .run-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-6 px-4">
        <div class="flex bg-slate-900/80 p-1 rounded-2xl border border-white/5">
            <button class="px-6 py-2 bg-blue-600 rounded-xl text-xs font-bold">Desktop 💻</button>
            <button class="px-6 py-2 text-slate-400 text-xs">Tablet 📟</button>
            <button class="px-6 py-2 text-slate-400 text-xs">Mobile 📱</button>
        </div>
        <h1 class="text-xl font-black text-blue-500 italic">MAJAL <span class="text-white font-light text-sm">PRO</span></h1>
    </header>

    <main class="flex-1 flex flex-col gap-6">
        <div class="window-glass flex-1 flex flex-col overflow-hidden relative">
            <div class="flex items-center justify-between p-4 border-b border-white/5">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">NUCLEUS v15 | محرك البناء السيادي</span>
            </div>

            <textarea id="editor" spellcheck="false">
عرف اسم_الموقع = "موقع مَجال الجديد"

<div style="padding:100px; text-align:center;">
  <h1 style="color:#2563eb; font-size:40px;">{اسم_الموقع}</h1>
  <p style="color:#666;">النظام جاهز للعمل</p>
</div></textarea>
            
            <div class="p-4 bg-black/20 text-[10px] text-blue-400 font-mono flex justify-end items-center gap-2">
                <span>النظام جاهز</span>
                <div class="w-4 h-4 bg-blue-500/20 rounded flex items-center justify-center">📟</div>
            </div>
        </div>

        <button onclick="run()" class="run-btn w-full py-6 text-white font-black text-xl flex items-center justify-center gap-3">
             تشغيل النظام ⚡
        </button>
    </main>

    <footer class="mt-6 flex justify-center">
        <div class="bg-slate-900/50 px-6 py-2 rounded-full border border-white/5 text-[10px] text-slate-500 font-mono">
            majal-pro.io/studio
        </div>
    </footer>

    <script>
        function run() {
            const code = document.getElementById('editor').value;
            alert("تم إقلاع المحرك بنجاح 🚀");
        }
    </script>
</body>
</html>
