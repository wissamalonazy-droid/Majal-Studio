<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJAL SOVEREIGN | مَجال السيادية</title>
    <style>
        :root {
            --royal-black: #050505;
            --navy: #0A1F44;
            --gold: #C5A059;
            --terminal-green: #4AF626;
        }

        body {
            background-color: var(--royal-black);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط التحكم العلوي */
        header {
            background: var(--navy);
            padding: 15px 25px;
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .system-info {
            display: flex;
            flex-direction: column;
        }

        .logo {
            color: var(--gold);
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0;
        }

        .status-tag {
            font-size: 10px;
            color: var(--terminal-green);
            text-transform: uppercase;
        }

        /* شريط الأوامر السريعة */
        .quick-bar {
            background: #111;
            padding: 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #222;
        }

        .q-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
        }

        .q-btn:hover { background: var(--gold); color: black; }

        /* منطقة المحرر الفولاذية */
        #editor {
            flex: 1;
            background: var(--royal-black);
            color: #eee;
            padding: 20px;
            font-size: 18px;
            border: none;
            outline: none;
            resize: none;
            text-align: right;
            line-height: 1.6;
        }

        /* الكونسول (المعالج المركزي) */
        #console {
            height: 35%;
            background: #000;
            border-top: 2px solid var(--gold);
            padding: 15px;
            overflow-y: auto;
            font-size: 13px;
            color: var(--terminal-green);
        }

        .run-btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 12px 35px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
        }

        .perf-tag { color: cyan; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="system-info">
        <h1 class="logo">MAJAL SYSTEM</h1>
        <span class="status-tag">● KERNEL_V5_EXTREME_STABILITY</span>
    </div>
    <button class="run-btn" onclick="MajalKernel.boot()">تشغيل المحرك ▶</button>
</header>

<div class="quick-bar">
    <button class="q-btn" onclick="add('عرف ')">عرف</button>
    <button class="q-btn" onclick="add(' = ')">=</button>
    <button class="q-btn" onclick="add('اطبع ')">اطبع</button>
    <button class="q-btn" onclick="add('ابني_منصة_عملاقة 100000')">اختبار 100k</button>
    <button class="q-btn" onclick="add('احسب ')">احسب</button>
    <button class="q-btn" onclick="copy()">نسخ 📋</button>
</div>

<textarea id="editor" spellcheck="false">
# مَجال: اختبار القوة الفولاذية
عرف المطور = "وسام"
عرف الهدف = "تحطيم حاجز المائة ألف سطر"

اطبع "بدء المعالجة لـ " + المطور

# أمر الانفجار البرمجي (100,000 سطر)
ابني_منصة_عملاقة 100000

اطبع "النظام مستقر.. مَجال تتفوق بصلابة"
</textarea>

<div id="console">> نظام مَجال جاهز للإقلاع...</div>

<script>
    const MajalKernel = {
        memory: new Map(),
        accumulator: 0,

        boot: function() {
            const code = document.getElementById('editor').value;
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML = "<div style='color:white'>[جاري تهيئة النواة...]</div>";
            
            this.memory.clear();
            const lines = code.split('\n');
            
            lines.forEach((line, index) => {
                this.execute(line.trim(), index + 1);
            });
        },

        execute: function(line, lineNum) {
            const consoleDiv = document.getElementById('console');
            try {
                if (!line || line.startsWith("#")) return;

                // 1. معالج المنصات العملاقة (100k Ready)
                if (line.startsWith("ابني_منصة_عملاقة")) {
                    const size = parseInt(line.match(/\d+/) || 100000);
                    this.stressTest(size);
                    return;
                }

                // 2. معالج التعريف
                if (line.startsWith("عرف")) {
                    let parts = line.replace("عرف", "").split("=");
                    let name = parts[0].trim();
                    let val = eval(this.translate(parts[1]));
                    this.memory.set(name, val);
                    consoleDiv.innerHTML += `<div>✔️ سجل: ${name}</div>`;
                }

                // 3. معالج الطباعة
                else if (line.startsWith("اطبع")) {
                    let content = line.replace("اطبع", "").trim();
                    let result = eval(this.translate(content));
                    consoleDiv.innerHTML += `<div style="color:var(--gold)">📄 > ${result}</div>`;
                }
            } catch (e) {
                consoleDiv.innerHTML += `<div style="color:red">❌ خطأ سطر ${lineNum}: ${line}</div>`;
            }
        },

        translate: function(expr) {
            this.memory.forEach((v, k) => {
                let safeVal = typeof v === 'string' ? `'${v}'` : v;
                expr = expr.replace(new RegExp(`\\b${k}\\b`, 'g'), safeVal);
            });
            return expr;
        },

        stressTest: function(size) {
            const consoleDiv = document.getElementById('console');
            const start = performance.now();
            
            // استخدام الذاكرة الافتراضية للمعالجة الضخمة
            const fragment = document.createDocumentFragment();
            const wrapper = document.createElement('div');
            wrapper.style.border = "1px solid #333";
            wrapper.style.padding = "5px";

            for(let i=1; i<=size; i++) {
                if(i % 10000 === 0) { // طباعة علامات التقدم كل 10 آلاف سطر
                     const marker = document.createElement('div');
                     marker.innerHTML = `<span style="color:cyan">[CHECKPOINT]: تم معالجة ${i} سطر...</span>`;
                     wrapper.appendChild(marker);
                }
            }
            
            fragment.appendChild(wrapper);
            consoleDiv.appendChild(fragment);
            
            const end = performance.now();
            consoleDiv.innerHTML += `<br><span class="perf-tag">🚀 تم توليد وفحص ${size.toLocaleString()} سطر في ${((end-start)/1000).toFixed(4)} ثانية!</span>`;
        }
    };

    function add(text) {
        const ed = document.getElementById('editor');
        ed.value += text;
        ed.focus();
    }

    function copy() {
        const ed = document.getElementById('editor');
        ed.select();
        document.execCommand('copy');
        alert("تم نسخ كود مَجال الفولاذي! ✅");
    }
</script>

</body>
</html>
